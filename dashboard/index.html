<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Aura Intelligence</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f0fb;
        --surface: #ffffff;
        --surface2: #f0eaf9;
        --border: #e0d5f0;
        --pink: #d1478a;
        --purple: #8b3fc8;
        --blue: #2563eb;
        --green: #16a34a;
        --orange: #ea580c;
        --red: #dc2626;
        --text: #1a1a2e;
        --muted: #7c6fa0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 12px;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        padding: 10px 18px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }
      .logo {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 3px;
        background: linear-gradient(90deg, var(--pink), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .live-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        animation: blink 1.5s infinite;
      }
      .live-dot.off {
        background: var(--muted);
        animation: none;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      .live-text {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--green);
      }
      .live-text.off {
        color: var(--muted);
      }
      .header-right {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
      }

      /* ── Layout ── */
      .layout {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
        align-items: stretch;
      }

      /* ── Session Sidebar ── */
      .sessions-panel {
        width: 250px;
        min-width: 250px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-hdr {
        padding: 10px 14px;
        font-size: 9px;
        letter-spacing: 2px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #sessions-list {
        overflow-y: auto;
        flex: 1;
      }
      .session-card {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.1s;
      }
      .session-card:hover {
        background: var(--surface2);
      }
      .session-card.active {
        background: var(--surface2);
        border-left: 2px solid var(--pink);
      }
      .s-ts {
        font-size: 9px;
        color: var(--muted);
        margin-bottom: 3px;
      }
      .s-query {
        font-size: 11px;
        color: var(--text);
        margin-bottom: 5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .s-tags {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .tag {
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 3px;
        background: var(--border);
        color: var(--muted);
      }
      .tag.live {
        background: rgba(74, 222, 128, 0.15);
        color: var(--green);
      }
      .tag.pink {
        background: rgba(232, 121, 160, 0.15);
        color: var(--pink);
      }

      /* ── Timeline ── */
      .timeline-panel {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
      }
      #empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--muted);
        font-size: 13px;
      }
      #timeline {
        display: none;
        position: relative;
        padding-left: 24px;
      }
      #timeline::before {
        content: "";
        position: absolute;
        left: 6px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: var(--border);
      }
      .ev-item {
        position: relative;
        margin-bottom: 5px;
        cursor: pointer;
      }
      .ev-item::before {
        content: "";
        position: absolute;
        left: -20px;
        top: 11px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        border: 1px solid var(--bg);
      }
      .ev-item[data-c="pink"]::before {
        background: var(--pink);
      }
      .ev-item[data-c="purple"]::before {
        background: var(--purple);
      }
      .ev-item[data-c="blue"]::before {
        background: var(--blue);
      }
      .ev-item[data-c="green"]::before {
        background: var(--green);
      }
      .ev-item[data-c="orange"]::before {
        background: var(--orange);
      }
      .ev-item[data-c="red"]::before {
        background: var(--red);
      }

      .ev-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 7px 10px;
        transition:
          border-color 0.1s,
          background 0.1s;
      }
      .ev-item:hover .ev-card,
      .ev-item.sel .ev-card {
        border-color: var(--purple);
        background: var(--surface2);
      }
      .ev-hdr {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .ev-icon {
        font-size: 11px;
      }
      .ev-label {
        font-size: 11px;
        flex: 1;
      }
      .ev-time {
        font-size: 9px;
        color: var(--muted);
      }
      .ev-sum {
        font-size: 10px;
        color: var(--muted);
        padding-left: 18px;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Detail Panel ── */
      .detail-panel {
        width: 320px;
        min-width: 320px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        overflow-y: scroll;
        padding: 14px;
        flex-shrink: 0;
      }
      .detail-empty {
        color: var(--muted);
        font-size: 11px;
        text-align: center;
        margin-top: 40px;
      }
      .detail-type {
        font-size: 9px;
        letter-spacing: 1.5px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .d-field {
        margin-bottom: 10px;
      }
      .d-key {
        font-size: 9px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 3px;
      }
      .d-val {
        font-size: 11px;
        color: var(--text);
        background: var(--surface2);
        border-radius: 4px;
        padding: 5px 8px;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .d-val.err {
        color: var(--red);
      }
      .thinking-box {
        background: linear-gradient(
          135deg,
          rgba(139, 63, 200, 0.04),
          rgba(209, 71, 138, 0.04)
        );
        border: 1px solid rgba(139, 63, 200, 0.2);
        border-radius: 5px;
        padding: 8px;
        font-size: 10px;
        color: var(--muted);
        white-space: pre-wrap;
        line-height: 1.65;
      }
      .img-prev {
        max-width: 100%;
        max-height: 110px;
        border-radius: 4px;
        margin-top: 4px;
        display: block;
      }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #c4b5e8;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">✦ AURA INTELLIGENCE</span>
      <div class="live-indicator">
        <span class="live-dot off" id="ldot"></span>
        <span class="live-text off" id="ltxt">CONNECTING</span>
      </div>
      <span class="header-right" id="hdr-count"></span>
    </header>

    <div class="layout">
      <aside class="sessions-panel">
        <div class="panel-hdr">SESSIONS</div>
        <div id="sessions-list">
          <div style="padding: 18px; color: var(--muted); text-align: center">
            Loading…
          </div>
        </div>
      </aside>

      <main class="timeline-panel">
        <div id="empty-state">← Select a session</div>
        <div id="timeline"></div>
      </main>

      <aside class="detail-panel" id="detail-panel">
        <div class="detail-empty">Click an event →</div>
      </aside>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────────
      const S = { sessions: [], activeIdx: null, selEvIdx: null, es: null };

      // ── Event display config ───────────────────────────────────────────────────────
      function cfg(e) {
        const t = e.event;
        if (t === "chat_start")
          return {
            i: "🚀",
            c: "purple",
            l: "Request started",
            s: `session ${(e.session_id || "").slice(0, 8)}`,
          };
        if (t === "gemini_request")
          return {
            i: "📸",
            c: "pink",
            l: "Sending photo to Gemini",
            s: e.image_bytes ? `${Math.round(e.image_bytes / 1024)}KB` : "",
          };
        if (t === "gemini_response") {
          const p = e.parsed || {};
          const sum =
            p.subject_type === "self"
              ? [p.build, p.vibe].filter(Boolean).join(" · ")
              : [p.garment_type, p.vibe].filter(Boolean).join(" · ");
          return { i: "✅", c: "green", l: "Vision parsed", s: sum || "—" };
        }
        if (t === "search_query_synthesized")
          return {
            i: "🔍",
            c: "blue",
            l: "Query synthesized",
            s: `"${(e.query || "").slice(0, 55)}"`,
          };
        if (t === "firecrawl_search_request")
          return {
            i: "🌐",
            c: "blue",
            l: "Searching",
            s: `"${(e.query || "").slice(0, 50)}"`,
          };
        if (t === "firecrawl_search_results")
          return {
            i: "🔗",
            c: "green",
            l: `${e.n_urls} URLs found`,
            s: (e.urls || []).slice(0, 3).map(domain).join(", "),
          };
        if (t === "firecrawl_scrape_request")
          return { i: "📄", c: "default", l: "Scraping", s: domain(e.url) };
        if (t === "firecrawl_scrape_result")
          return e.success
            ? {
                i: "✅",
                c: "green",
                l: `Scraped ${Math.round((e.markdown_len || 0) / 1000)}k chars`,
                s: domain(e.url),
              }
            : { i: "❌", c: "red", l: "Scrape failed", s: domain(e.url) };
        if (t === "web_search_k2" || t === "web_search_gemini") {
          const lbl = (e.label || "").toLowerCase();
          // Intent extraction
          if (lbl === "intent") {
            const p = e.parsed || {};
            const parts = [p.garment_type, p.vibe, p.colors?.join(",")].filter(
              Boolean,
            );
            return {
              i: "🔎",
              c: "blue",
              l: "Intent extracted",
              s: parts.join(" · ") || "see detail",
            };
          }
          // Query synthesis
          if (lbl === "query_synthesis") {
            return {
              i: "✍️",
              c: "purple",
              l: "Query synthesized",
              s: `"${(e.raw_output || "").trim().slice(0, 60)}"`,
            };
          }
          // Material audit
          if (lbl.startsWith("audit:")) {
            const p = e.parsed || {};
            const meets = p.meets_50pct_cotton;
            return {
              i: meets ? "🌿" : "🧪",
              c: meets ? "green" : "orange",
              l: "Material audit",
              s: p.reasoning?.slice(0, 70) || "",
            };
          }
          // Product extraction
          const ok = e.parsed && !e.error && e.parsed.name;
          const p = e.parsed || {};
          return ok
            ? {
                i: "🧠",
                c: "purple",
                l: "Product extracted",
                s: `${p.name || "?"} · $${p.price || "?"}`,
              }
            : {
                i: "❌",
                c: "red",
                l: "Extraction failed",
                s: (e.error || "null result").slice(0, 70),
              };
        }
        if (t === "k2_request")
          return { i: "🎯", c: "pink", l: "K2 initial picks started", s: "" };
        if (t === "k2_thinking")
          return {
            i: "💭",
            c: "purple",
            l: "K2 thinking",
            s: (e.content || "").slice(0, 80) + "…",
          };
        if (t === "k2_response")
          return {
            i: "✨",
            c: "green",
            l: `${(e.result?.picks || []).length} picks selected`,
            s: "",
          };
        if (t === "final_picks_request")
          return {
            i: "🎬",
            c: "pink",
            l: "Generating final Aura script",
            s: "",
          };
        if (t === "final_picks_response")
          return {
            i: "🎤",
            c: "green",
            l: "Aura script ready",
            s: `${(e.result?.picks || []).length} final picks`,
          };
        if (t === "review_crawl_start")
          return {
            i: "👗",
            c: "orange",
            l: "Review crawl started",
            s: domain(e.product_url),
          };
        if (t === "review_crawl_scrape")
          return {
            i: "📄",
            c: "default",
            l: `Scraped ${Math.round((e.markdown_len || 0) / 1000)}k chars`,
            s: `scrape_id: ${(e.scrape_id || "?").slice(0, 8)}`,
          };
        if (t === "review_crawl_interact")
          return {
            i: "🖱️",
            c: "orange",
            l: `Interact call #${e.call_num}`,
            s: e.note || `${e.raw_output_len || 0} chars`,
          };
        if (t === "review_crawl_result") {
          const ok = e.crawl_status === "success";
          return {
            i: ok ? "📊" : "⚠️",
            c: ok ? "green" : "orange",
            l: `Reviews: ${e.total_reviews_found || 0} · ${e.crawl_status}`,
            s: e.sizing_sentiment || "",
          };
        }
        if (t === "review_crawl_error")
          return {
            i: "⚠️",
            c: "red",
            l: `Crawl error: ${e.error_type}`,
            s: (e.detail || "").slice(0, 70),
          };
        if (t === "sizing_analyzer_skip")
          return {
            i: "⏭️",
            c: "default",
            l: "Sizing skipped",
            s: `${domain(e.product_url)} · ${e.reason}`,
          };
        if (t === "sizing_analyzer_request")
          return {
            i: "📏",
            c: "blue",
            l: "Sizing analysis",
            s: domain(e.product_url),
          };
        if (t === "sizing_analyzer_result") {
          const v = e.verdict;
          return v
            ? {
                i: "📏",
                c: "blue",
                l: `Size: ${v.recommended_size} (${v.confidence})`,
                s:
                  v.size_adjustment !== "none"
                    ? `size ${v.size_adjustment}`
                    : "true to size",
              }
            : { i: "❌", c: "red", l: "Sizing failed", s: e.error || "" };
        }
        return { i: "◦", c: "default", l: t || "unknown", s: "" };
      }

      function domain(url) {
        if (!url) return "";
        try {
          const u = new URL(url);
          return u.hostname + u.pathname.slice(0, 28);
        } catch {
          return url.slice(0, 50);
        }
      }

      // ── Helpers ────────────────────────────────────────────────────────────────────
      function esc(s) {
        if (s == null) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function relTime(ts) {
        if (!ts) return "";
        const d = Date.now() - new Date(ts).getTime();
        if (d < 60000) return "just now";
        if (d < 3600000) return `${Math.round(d / 60000)}m ago`;
        if (d < 86400000) return `${Math.round(d / 3600000)}h ago`;
        return new Date(ts).toLocaleDateString();
      }

      function fmtT(ts) {
        if (!ts) return "";
        return new Date(ts).toLocaleTimeString("en-US", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      // ── Session summary ────────────────────────────────────────────────────────────
      function smry(session) {
        let query = "",
          picks = 0;
        const sites = new Set();
        for (const e of session.events || []) {
          if (e.event === "search_query_synthesized" && e.query)
            query = e.query;
          if (
            (e.event === "k2_response" || e.event === "final_picks_response") &&
            e.result?.picks
          )
            picks = e.result.picks.length;
          if (e.event === "firecrawl_scrape_request" && e.url) {
            try {
              sites.add(
                new URL(e.url).hostname.replace("www.", "").split(".")[0],
              );
            } catch {}
          }
        }
        const done = (session.events || []).some(
          (e) =>
            e.event === "final_picks_response" || e.event === "k2_response",
        );
        return {
          query: query.slice(0, 48),
          picks,
          sites: [...sites].slice(0, 3),
          live: !done,
        };
      }

      // ── Render sidebar ─────────────────────────────────────────────────────────────
      function renderSidebar() {
        const el = document.getElementById("sessions-list");
        if (!S.sessions.length) {
          el.innerHTML =
            '<div style="padding:18px;color:var(--muted);text-align:center;font-size:11px">No sessions yet.<br>Make a /chat request.</div>';
          return;
        }
        el.innerHTML = S.sessions
          .map((s, i) => {
            const m = smry(s);
            return `<div class="session-card${S.activeIdx === i ? " active" : ""}" onclick="selectSession(${i})">
      <div class="s-ts">${relTime(s.ts)} · ${fmtT(s.ts)}</div>
      <div class="s-query">${esc(m.query || "Request")}</div>
      <div class="s-tags">
        ${m.live ? '<span class="tag live">● LIVE</span>' : ""}
        ${m.picks ? `<span class="tag pink">${m.picks} picks</span>` : ""}
        ${m.sites.map((x) => `<span class="tag">${esc(x)}</span>`).join("")}
        <span class="tag">${(s.events || []).length} events</span>
      </div>
    </div>`;
          })
          .join("");
      }

      // ── Render timeline ────────────────────────────────────────────────────────────
      function renderTimeline(session) {
        const tl = document.getElementById("timeline");
        const es = document.getElementById("empty-state");
        if (!session?.events?.length) {
          es.style.display = "flex";
          tl.style.display = "none";
          return;
        }
        es.style.display = "none";
        tl.style.display = "block";
        tl.innerHTML = (session.events || []).map(evCard).join("");
      }

      function evCard(e, i) {
        const c = cfg(e);
        return `<div class="ev-item${S.selEvIdx === i ? " sel" : ""}" data-c="${c.c}" data-i="${i}" onclick="selectEv(${i})">
    <div class="ev-card">
      <div class="ev-hdr">
        <span class="ev-icon">${c.i}</span>
        <span class="ev-label">${esc(c.l)}</span>
        <span class="ev-time">${fmtT(e.ts)}</span>
      </div>
      ${c.s ? `<div class="ev-sum">${esc(c.s)}</div>` : ""}
    </div>
  </div>`;
      }

      // ── Render detail ──────────────────────────────────────────────────────────────
      function renderDetail(e) {
        const el = document.getElementById("detail-panel");
        const c = cfg(e);
        let html = `<div class="detail-type">${esc(e.event)}</div>`;
        html += df("timestamp", fmtT(e.ts));

        switch (e.event) {
          case "gemini_response":
            if (e.parsed)
              Object.entries(e.parsed).forEach(([k, v]) => {
                if (k !== "subject_type") html += df(k, v);
              });
            break;
          case "web_search_k2":
          case "web_search_gemini": {
            const lbl = (e.label || "").toLowerCase();
            if (lbl === "intent") {
              // Show the intent prompt + extracted intent fields
              html += df("label", e.label);
              if (e.prompt)
                html += `<div class="d-field"><div class="d-key">PROMPT SENT TO K2</div><div class="d-val">${esc(e.prompt)}</div></div>`;
              if (e.parsed)
                Object.entries(e.parsed).forEach(
                  ([k, v]) =>
                    (html += df(k, Array.isArray(v) ? v.join(", ") : v)),
                );
              if (e.error) html += df("error", e.error, true);
            } else if (lbl === "query_synthesis") {
              // Show the synthesis prompt + the synthesized query output
              html += df("label", e.label);
              if (e.prompt)
                html += `<div class="d-field"><div class="d-key">SYNTHESIS PROMPT</div><div class="d-val">${esc(e.prompt)}</div></div>`;
              if (e.raw_output)
                html += `<div class="d-field"><div class="d-key">SYNTHESIZED QUERY</div><div class="d-val" style="font-size:15px;font-weight:bold;color:var(--purple)">${esc(e.raw_output.trim())}</div></div>`;
            } else if (lbl.startsWith("audit:")) {
              html += df("url", lbl.replace("audit:", ""));
              if (e.prompt)
                html += `<div class="d-field"><div class="d-key">MATERIAL TEXT</div><div class="d-val">${esc(e.prompt.split("MATERIAL TEXT:").pop()?.trim() || e.prompt)}</div></div>`;
              if (e.parsed) {
                html += df(
                  "meets_50pct_cotton",
                  String(e.parsed.meets_50pct_cotton),
                );
                html += df("reasoning", e.parsed.reasoning);
                if (e.parsed.materials)
                  html += df(
                    "materials",
                    e.parsed.materials
                      .map((m) => `${m.percentage}% ${m.type}`)
                      .join(", "),
                  );
              }
            } else {
              // Product extraction
              html += df("label", e.label);
              if (e.parsed) {
                html += df("name", e.parsed.name);
                html += df("brand", e.parsed.brand);
                html += df(
                  "price",
                  e.parsed.price ? `$${e.parsed.price}` : null,
                );
                html += df("material", e.parsed.material_composition);
                html += df(
                  "sizes",
                  (e.parsed.available_sizes || []).join(", "),
                );
                if (e.parsed.image_url)
                  html += `<div class="d-field"><div class="d-key">IMAGE</div><img class="img-prev" src="${esc(e.parsed.image_url)}" onerror="this.style.display='none'"></div>`;
              }
              if (e.error) html += df("error", e.error, true);
            }
            break;
          }
          case "k2_thinking":
            html += `<div class="d-field"><div class="d-key">THINKING</div><div class="thinking-box">${esc(e.content || "")}</div></div>`;
            break;
          case "k2_response":
          case "final_picks_response":
            if (e.result?.picks) {
              html += `<div class="d-field"><div class="d-key">PICKS</div><div class="d-val">${e.result.picks
                .map(
                  (p) =>
                    `<div style="padding:3px 0;border-bottom:1px solid var(--border)">${esc(p.id)}: ${esc((p.justification || "").slice(0, 90))}</div>`,
                )
                .join("")}</div></div>`;
            }
            if (e.result?.aura_script)
              html += df("aura_script", e.result.aura_script);
            break;
          case "firecrawl_search_results":
            html += `<div class="d-field"><div class="d-key">URLS (${(e.urls || []).length})</div><div class="d-val">${(e.urls || []).map((u) => `<div>${esc(u)}</div>`).join("")}</div></div>`;
            break;
          case "review_crawl_result":
            [
              "crawl_status",
              "total_reviews_found",
              "sizing_sentiment",
              "material_composition",
              "review_summary",
            ].forEach((k) => (html += df(k, e[k])));
            html += df(
              "top_complaints",
              (e.top_sizing_complaints || []).join(", "),
            );
            if (e.garment_measurements)
              html += df(
                "measurements",
                JSON.stringify(e.garment_measurements),
              );
            break;
          case "review_crawl_interact":
            html += df("call_num", e.call_num);
            html += df("note", e.note);
            if (e.raw_output)
              html += df(
                "raw_output",
                e.raw_output.slice(0, 600) +
                  (e.raw_output.length > 600 ? "…" : ""),
              );
            break;
          case "sizing_analyzer_result":
            if (e.verdict)
              Object.entries(e.verdict).forEach(
                ([k, v]) =>
                  (html += df(k, Array.isArray(v) ? v.join(", ") : v)),
              );
            if (e.error) html += df("error", e.error, true);
            break;
          default:
            Object.entries(e).forEach(([k, v]) => {
              if (k === "event" || k === "ts") return;
              const str =
                typeof v === "object"
                  ? JSON.stringify(v, null, 2)
                  : String(v ?? "");
              html += df(k, str);
            });
        }
        el.innerHTML = html;
      }

      function df(key, val, isErr = false) {
        if (val == null || val === "") return "";
        return `<div class="d-field">
    <div class="d-key" ${isErr ? 'style="color:var(--red)"' : ""}>${esc(key.toUpperCase().replace(/_/g, " "))}</div>
    <div class="d-val${isErr ? " err" : ""}">${esc(String(val))}</div>
  </div>`;
      }

      // ── Interactions ───────────────────────────────────────────────────────────────
      function selectSession(i) {
        S.activeIdx = i;
        S.selEvIdx = null;
        renderSidebar();
        renderTimeline(S.sessions[i]);
        document.getElementById("detail-panel").innerHTML =
          '<div class="detail-empty">Click an event →</div>';
      }

      function selectEv(i) {
        document
          .querySelectorAll(".ev-item")
          .forEach((el) => el.classList.remove("sel"));
        const el = document.querySelector(`.ev-item[data-i="${i}"]`);
        if (el) el.classList.add("sel");
        S.selEvIdx = i;
        const session = S.sessions[S.activeIdx];
        if (session?.events?.[i]) renderDetail(session.events[i]);
      }

      // ── Data loading ───────────────────────────────────────────────────────────────
      async function loadSessions() {
        try {
          const r = await fetch("/logs/sessions");
          const data = await r.json();
          S.sessions = data;
          document.getElementById("hdr-count").textContent =
            `${data.length} session${data.length !== 1 ? "s" : ""}`;
          renderSidebar();
          if (S.activeIdx === null && data.length) selectSession(0);
        } catch (err) {
          console.warn("loadSessions failed:", err);
        }
      }

      // ── Live SSE ───────────────────────────────────────────────────────────────────
      function setLive(on) {
        document.getElementById("ldot").className =
          "live-dot" + (on ? "" : " off");
        document.getElementById("ltxt").className =
          "live-text" + (on ? "" : " off");
        document.getElementById("ltxt").textContent = on
          ? "LIVE"
          : "RECONNECTING";
      }

      function connectSSE() {
        if (S.es) S.es.close();
        S.es = new EventSource("/logs/stream");
        S.es.onopen = () => setLive(true);
        S.es.onerror = () => {
          setLive(false);
          setTimeout(connectSSE, 3000);
        };
        S.es.onmessage = (ev) => {
          try {
            handleLive(JSON.parse(ev.data));
          } catch {}
        };
      }

      function handleLive(event) {
        if (event.event === "chat_start") {
          // Insert new session at front
          const newS = {
            session_id: event.session_id || "live",
            ts: event.ts,
            events: [event],
          };
          S.sessions.unshift(newS);
          if (S.activeIdx !== null) S.activeIdx++;
          renderSidebar();
          if (S.activeIdx === null || S.activeIdx === 1) selectSession(0);
        } else if (S.sessions.length) {
          // Append to most recent session
          S.sessions[0].events.push(event);
          renderSidebar();
          // If that session is active, append to timeline
          if (S.activeIdx === 0) {
            const tl = document.getElementById("timeline");
            tl.style.display = "block";
            document.getElementById("empty-state").style.display = "none";
            const idx = S.sessions[0].events.length - 1;
            const div = document.createElement("div");
            div.innerHTML = evCard(event, idx);
            tl.appendChild(div.firstElementChild);
            // Auto-scroll
            document.querySelector(".timeline-panel").scrollTop = 999999;
          }
        }
      }

      // ── Init ───────────────────────────────────────────────────────────────────────
      loadSessions();
      connectSSE();
      setInterval(loadSessions, 30000);
    </script>
  </body>
</html>
